version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_journal
      POSTGRES_USER: tj_user
      POSTGRES_PASSWORD: tj_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .\docker\postgres\init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tj_user -d trading_journal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tj-network

  redis:
    image: redis:7-alpine
    container_name: tj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password_dev
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tj-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tj-network:
    driver: bridge
